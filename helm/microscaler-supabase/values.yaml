# Default namespace for installs: helm install -n data ...
createNamespace: false

nameOverride: ""

postgres:
  enabled: true
  image: docker.io/casibbald/postgres:17-duckdb-supabase-v2
  initBusyboxImage: busybox:1.36
  replicas: 1
  podAnnotations:
    prometheus.io/scrape: "true"
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  service:
    type: NodePort
    port: 5432
    nodePort: 30432
  initSql:
    jwtSecret: ""
  initPasswords:
    default: ""
    authenticator: ""
    supabase_admin: ""
    supabase_auth_admin: ""
    supabase_storage_admin: ""
    supabase_functions_admin: ""
    pgbouncer: ""

postgresMeta:
  enabled: true
  image: supabase/postgres-meta:v0.91.0
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

postgresExporter:
  enabled: true
  image: prometheuscommunity/postgres-exporter:v0.15.0
  resources:
    requests:
      memory: 32Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m
  connection:
    host: postgres
    port: "5432"
    user: ""
    password: ""

parquetLake:
  enabled: true
  createConfigMap: true

persistence:
  mode: staticPv
  storageClassName: local-storage
  reclaimPolicy: Retain
  nodeHostname: supabase-control-plane
  postgres:
    pvName: postgres-pv
    pvcName: postgres-storage
    size: 1Gi
    hostPath: /var/lib/data/postgres
  parquet:
    pvName: parquet-lake-pv
    pvcName: parquet-lake-storage
    size: 5Gi
    hostPath: /var/lib/data/parquet-lake
  existingClaim:
    postgres: ""
    parquet: ""

# Keys use literal NAMESPACE; rendered into ConfigMap as Release.Namespace (Helm tpl replace).
infraConfig:
  name: infra-config
  namespacePlaceholder: NAMESPACE
  data:
    POSTGRES_DB: postgres
    PGDATA: /var/lib/postgresql/data
    POSTGRES_CONTAINER_PORT: "5432"
    POSTGRES_SERVICE_PORT: "5432"
    POSTGRES_SERVICE_NODEPORT: "30432"
    POSTGRES_META_PORT: "7808"
    POSTGRES_META_DB_HOST: postgres.NAMESPACE.svc.cluster.local
    POSTGRES_META_DB_PORT: "5432"
    POSTGRES_META_DB_NAME: postgres
    POSTGRES_META_DB_USER: supabase_admin
    POSTGRES_EXPORTER_CONTAINER_PORT: "9187"
    POSTGRES_EXPORTER_SERVICE_PORT: "9187"
    SERVICE_POSTGRES_HOST: postgres.NAMESPACE.svc.cluster.local
    SERVICE_POSTGRES_PORT: "5432"
    SERVICE_POSTGRES_META_HOST: postgres-meta.NAMESPACE.svc.cluster.local
    SERVICE_POSTGRES_META_PORT: "7808"
    SERVICE_POSTGREST_HOST: postgrest.NAMESPACE.svc.cluster.local
    SERVICE_POSTGREST_PORT: "3000"
    SERVICE_REALTIME_HOST: realtime.NAMESPACE.svc.cluster.local
    SERVICE_REALTIME_PORT: "7400"
    SERVICE_SUPERVISOR_HOST: supavisor.NAMESPACE.svc.cluster.local
    SERVICE_SUPERVISOR_PORT: "5432"
    SERVICE_GOTRUE_HOST: gotrue.NAMESPACE.svc.cluster.local
    SERVICE_GOTRUE_PORT: "7999"
    SERVICE_STORAGE_API_HOST: storage-api.NAMESPACE.svc.cluster.local
    SERVICE_STORAGE_API_PORT: "7500"
    SERVICE_STUDIO_HOST: supabase-studio.NAMESPACE.svc.cluster.local
    SERVICE_STUDIO_PORT: "3000"
    SERVICE_EDGE_RUNTIME_HOST: edge-runtime.NAMESPACE.svc.cluster.local
    SERVICE_EDGE_RUNTIME_PORT: "7900"
    PGRST_DB_SCHEMAS: public,storage,auth
    PGRST_DB_EXTRA_SEARCH_PATH: public,extensions
    PGRST_DB_ANON_ROLE: anon
    PGRST_DB_USE_LEGACY_GUCS: "false"
    PGRST_APP_SETTINGS_JWT_EXP: "3600"
    REALTIME_PORT: "7400"
    REALTIME_DB_HOST: postgres.NAMESPACE.svc.cluster.local
    REALTIME_DB_PORT: "5432"
    REALTIME_DB_USER: supabase_admin
    REALTIME_DB_NAME: postgres
    REALTIME_DB_SEARCH_PATH: SET search_path TO _realtime
    REALTIME_DB_POOL_SIZE: "10"
    REALTIME_NODE_NAME: realtime-dev
    REALTIME_ENABLE_TAIL: "true"
    REALTIME_ENABLE_PRESENCE: "true"
    REALTIME_BROADCAST_ADDR: localhost:7400
    SUPERVISOR_POOL_MODE: transaction
    SUPERVISOR_MAX_CLIENT_CONNECTIONS: "100"
    SUPERVISOR_DEFAULT_POOL_SIZE: "20"
    GOTRUE_SITE_URL: http://gotrue.NAMESPACE.svc.cluster.local:7999
    GOTRUE_API_HOST: 0.0.0.0
    GOTRUE_API_PORT: "7999"
    GOTRUE_DB_DRIVER: postgres
    GOTRUE_DB_SCHEMAS: public,auth
    GOTRUE_API_EXTERNAL_URL: http://gotrue.NAMESPACE.svc.cluster.local:7999
    GOTRUE_JWT_ADMIN_ROLES: service_role
    GOTRUE_JWT_AUD: authenticated
    GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
    GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
    GOTRUE_EXTERNAL_PHONE_ENABLED: "true"
    GOTRUE_SMS_AUTOCONFIRM: "true"
    GOTRUE_MAILER_AUTOCONFIRM: "true"
    GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
    GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
    GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
    GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    GOTRUE_MAILER_SMTP_ADMIN_EMAIL: admin@localhost
    GOTRUE_MAILER_SMTP_HOST: localhost
    GOTRUE_MAILER_SMTP_PORT: "1025"
    GOTRUE_SITE_NAME: Microscaler
    STORAGE_API_PORT: "7500"
    STORAGE_API_PGRST_URL: http://postgrest.NAMESPACE.svc.cluster.local:3000
    STORAGE_API_FILE_SIZE_LIMIT: "52428800"
    STORAGE_API_STORAGE_BACKEND: file
    STORAGE_API_FILE_STORAGE_BACKEND_PATH_PREFIX: storage
    STUDIO_PG_META_URL: http://postgres-meta.NAMESPACE.svc.cluster.local:7808
    STUDIO_DB_HOST: postgres.NAMESPACE.svc.cluster.local
    STUDIO_DB_PORT: "5432"
    STUDIO_DB_NAME: postgres
    STUDIO_DB_USER: postgres
    STUDIO_DEFAULT_ORGANIZATION: Microscaler
    STUDIO_DEFAULT_PROJECT: Microscaler
    STUDIO_PGRST_URL: http://postgrest.NAMESPACE.svc.cluster.local:3000
    STUDIO_PGRST_PROXY_URL: http://localhost:3003
    STUDIO_ENABLE_LOGS: "true"
    EDGE_RUNTIME_PGRST_URL: http://postgrest.NAMESPACE.svc.cluster.local:3000
    EDGE_RUNTIME_PGRST_PROXY_URL: http://localhost:3003
    EDGE_RUNTIME_ENABLE_DEV_MODE: "false"
  extra: {}

secret:
  create: true
  name: infra-secrets
  existingSecret: ""
  existingSecretKeys:
    postgresExporterDataSourceUri: POSTGRES_EXPORTER_DATA_SOURCE_URI
  data:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_META_DB_PASSWORD: postgres
    POSTGRES_META_DB_PASSWORD_ENCRYPTION_KEY: "01234567890123456789012345678901"
