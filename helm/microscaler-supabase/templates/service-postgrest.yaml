{{- if .Values.postgrest.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: postgrest
  namespace: {{ include "microscaler-supabase.namespace" . }}
  labels:
    {{- include "microscaler-supabase.labels" . | nindent 4 }}
    app: postgrest
  {{- with .Values.postgrest.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.postgrest.service.type | quote }}
  ports:
    - port: {{ .Values.postgrest.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: postgrest
{{- end }}
