{{- if .Values.postgrest.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  namespace: {{ include "microscaler-supabase.namespace" . }}
  labels:
    {{- include "microscaler-supabase.labels" . | nindent 4 }}
    app: postgrest
spec:
  replicas: {{ .Values.postgrest.replicas }}
  selector:
    matchLabels:
      app: postgrest
  template:
    metadata:
      labels:
        app: postgrest
        {{- include "microscaler-supabase.labels" . | nindent 8 }}
        {{- with .Values.postgrest.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/infra-config: {{ include (print $.Template.BasePath "/configmap-infra.yaml") . | sha256sum }}
        checksum/infra-secret: {{ include (print $.Template.BasePath "/secret-infra.yaml") . | sha256sum }}
        {{- with .Values.postgrest.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.postgrest.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgrest
          image: {{ .Values.postgrest.image | quote }}
          imagePullPolicy: {{ .Values.postgrest.imagePullPolicy | quote }}
          {{- with .Values.postgrest.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.postgrest.service.port }}
              name: http
          env:
            - name: PGRST_SERVER_HOST
              value: {{ .Values.postgrest.env.serverHost | quote }}
            - name: PGRST_SERVER_PORT
              value: {{ .Values.postgrest.service.port | quote }}
            - name: PGRST_DB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "microscaler-supabase.infraSecretName" . }}
                  key: {{ include "microscaler-supabase.postgrestDbUriSecretKey" . | quote }}
            - name: PGRST_DB_SCHEMAS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.infraConfig.name }}
                  key: PGRST_DB_SCHEMAS
            - name: PGRST_DB_EXTRA_SEARCH_PATH
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.infraConfig.name }}
                  key: PGRST_DB_EXTRA_SEARCH_PATH
            - name: PGRST_DB_ANON_ROLE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.infraConfig.name }}
                  key: PGRST_DB_ANON_ROLE
            - name: PGRST_DB_USE_LEGACY_GUCS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.infraConfig.name }}
                  key: PGRST_DB_USE_LEGACY_GUCS
            - name: PGRST_APP_SETTINGS_JWT_EXP
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.infraConfig.name }}
                  key: PGRST_APP_SETTINGS_JWT_EXP
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "microscaler-supabase.infraSecretName" . }}
                  key: {{ include "microscaler-supabase.postgrestJwtSecretKey" . | quote }}
            - name: PGRST_APP_SETTINGS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "microscaler-supabase.infraSecretName" . }}
                  key: {{ include "microscaler-supabase.postgrestAppSettingsJwtSecretKey" . | quote }}
          resources:
            {{- toYaml .Values.postgrest.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
{{- end }}
