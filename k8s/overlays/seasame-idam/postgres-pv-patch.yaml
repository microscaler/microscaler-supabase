apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
spec:
  hostPath:
    path: /mnt/sesame-idam-data/postgres
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - sesame-idam-control-plane
