apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
spec:
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          # Default Kind node when cluster name is `kind` (shared-kind-cluster / hauliage kind-config.yaml).
          - kind-control-plane
