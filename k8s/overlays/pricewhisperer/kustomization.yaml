apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../data

patches:
  - path: postgres-pv-patch.yaml
    target:
      kind: PersistentVolume
      name: postgres-pv
  - path: parquet-lake-pv-patch.yaml
    target:
      kind: PersistentVolume
      name: parquet-lake-pv
