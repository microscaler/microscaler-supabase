SERVICE_POSTGREST_HOST=postgrest.data.svc.cluster.local
SERVICE_POSTGREST_PORT=3000
SERVICE_REALTIME_HOST=realtime.data.svc.cluster.local
SERVICE_REALTIME_PORT=7400
SERVICE_SUPERVISOR_HOST=supavisor.data.svc.cluster.local
SERVICE_SUPERVISOR_PORT=5432
SERVICE_GOTRUE_HOST=gotrue.data.svc.cluster.local
