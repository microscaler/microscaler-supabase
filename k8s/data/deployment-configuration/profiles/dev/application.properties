REALTIME_PORT=7400
REALTIME_DB_HOST=postgres.data.svc.cluster.local
REALTIME_DB_PORT=5432
REALTIME_DB_USER=supabase_admin
REALTIME_DB_NAME=postgres
REALTIME_DB_SEARCH_PATH=SET search_path TO _realtime
REALTIME_DB_POOL_SIZE=10
REALTIME_NODE_NAME=realtime-dev
REALTIME_ENABLE_TAIL=true
REALTIME_ENABLE_PRESENCE=true
REALTIME_BROADCAST_ADDR=localhost:7400

SUPERVISOR_POOL_MODE=transaction
SUPERVISOR_MAX_CLIENT_CONNECTIONS=100
SUPERVISOR_DEFAULT_POOL_SIZE=20

GOTRUE_SITE_URL=http://gotrue.data.svc.cluster.local:7999
GOTRUE_API_HOST=0.0.0.0
GOTRUE_API_PORT=7999
GOTRUE_DB_DRIVER=postgres
GOTRUE_DB_SCHEMAS=public,auth
GOTRUE_API_EXTERNAL_URL=http://gotrue.data.svc.cluster.local:7999
GOTRUE_JWT_ADMIN_ROLES=service_role
GOTRUE_JWT_AUD=authenticated
GOTRUE_JWT_DEFAULT_GROUP_NAME=authenticated
GOTRUE_EXTERNAL_EMAIL_ENABLED=true
GOTRUE_EXTERNAL_PHONE_ENABLED=true
GOTRUE_SMS_AUTOCONFIRM=true
GOTRUE_MAILER_AUTOCONFIRM=true
GOTRUE_MAILER_URLPATHS_INVITE=/auth/v1/verify
GOTRUE_MAILER_URLPATHS_CONFIRMATION=/auth/v1/verify
GOTRUE_MAILER_URLPATHS_RECOVERY=/auth/v1/verify
GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE=/auth/v1/verify
GOTRUE_MAILER_SMTP_ADMIN_EMAIL=admin@localhost
GOTRUE_MAILER_SMTP_HOST=localhost
GOTRUE_MAILER_SMTP_PORT=1025
