# Supabase stack only - non-sensitive config (infra-config)
# For full dev (incl. MinIO, Mailpit, etc.) copy from PriceWhisperer or merge.

POSTGRES_DB=postgres
PGDATA=/var/lib/postgresql/data
POSTGRES_CONTAINER_PORT=5432
POSTGRES_SERVICE_PORT=5432
POSTGRES_SERVICE_NODEPORT=30432

POSTGRES_META_PORT=7808
