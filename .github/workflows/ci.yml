name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  detect:
    name: Detect Contexts
    runs-on: ubuntu-latest
    outputs:
      pipeline-context: ${{ steps.detect.outputs.pipeline-context }}
      non-helm-matrix-count: ${{ steps.nonhelm.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Contexts
        id: detect
        uses: octopilot/actions/detect-contexts@main
      - name: Count non-Helm matrix entries (for integration-validate)
        id: nonhelm
        shell: bash
        env:
          PIPELINE_CONTEXT: ${{ steps.detect.outputs.pipeline-context }}
        run: |
          N="$(echo "$PIPELINE_CONTEXT" | jq '[.matrix[]? | select(.language != "helm")] | length')"
          echo "count=$N" >> "$GITHUB_OUTPUT"

  lint:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).languages) != '[]'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: octopilot/actions/lint@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}

  test:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).matrix) != '[]'
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: octopilot/actions/test@main
        with:
          pipeline-context: ${{ toJson(matrix) }}

  # integration-validate expects a non-Helm matrix row (Rust/Go build). This repo’s Skaffold
  # primary artifact is Docker + Helm chart contexts, so detect-contexts only adds "helm" to the
  # test matrix. When that happens, generate the ttl UUID here; otherwise delegate to Octopilot.
  integration-validate:
    name: Integration (validate)
    needs: [detect, lint, test]
    runs-on: ubuntu-latest
    outputs:
      uuid: ${{ steps.export.outputs.uuid }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate primary build (Octopilot)
        id: validate_octo
        if: needs.detect.outputs.non-helm-matrix-count != '0'
        uses: octopilot/actions/integration-validate@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}
          smoke-binary-path: ""
          smoke-expect-pattern: ""

      - name: Generate UUID (Skaffold Docker + chart only)
        id: validate_fallback
        if: needs.detect.outputs.non-helm-matrix-count == '0'
        shell: bash
        run: |
          TTL_UUID="$(uuidgen | tr -d '-' | tr '[:upper:]' '[:lower:]')"
          echo "uuid=${TTL_UUID}" >> "$GITHUB_OUTPUT"

      - name: Export UUID
        id: export
        shell: bash
        env:
          OCTO: ${{ steps.validate_octo.outputs.uuid }}
          FB: ${{ steps.validate_fallback.outputs.uuid }}
        run: |
          if [ -n "${OCTO:-}" ]; then echo "uuid=$OCTO" >> "$GITHUB_OUTPUT"; else echo "uuid=$FB" >> "$GITHUB_OUTPUT"; fi

  integration-artifacts:
    name: Integration (${{ matrix.output_key }})
    needs: [detect, integration-validate]
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).integration_matrix) != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).integration_matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and push artifact
        id: build
        uses: octopilot/actions/integration-build-artifact@main
        with:
          artifact: ${{ toJson(matrix) }}
          ttl-uuid: ${{ needs.integration-validate.outputs.uuid }}
          op_version: v1.0.17

      - name: Upload artifact outputs
        run: |
          mkdir -p artifact-out
          mv outputs.txt "artifact-out/${{ matrix.output_key }}.txt" 2>/dev/null || true
          [ -f build_result.json ] && cp build_result.json artifact-out/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: integration-${{ matrix.output_key }}
          path: artifact-out
          retention-days: 1

  integration-verify:
    name: Integration (verify builds)
    needs: integration-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: integration-*
          path: artifact-outputs
      - name: Merge build_result.json
        uses: octopilot/actions/merge-build-results@main
        with:
          directory: artifact-outputs
          output-path: build_result.json
      - name: Show merged builds
        run: jq . build_result.json
      - name: Require postgres + chart build metadata
        run: |
          COUNT="$(jq '.builds | length' build_result.json)"
          if [ "$COUNT" -lt 2 ]; then
            echo "::error::Expected at least 2 integration builds (postgres image + chart), got $COUNT"
            exit 1
          fi
