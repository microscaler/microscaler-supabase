name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  detect:
    name: Detect Contexts
    runs-on: ubuntu-latest
    outputs:
      pipeline-context: ${{ steps.detect.outputs.pipeline-context }}
      non-helm-matrix-count: ${{ steps.nonhelm.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect Contexts
        id: detect
        uses: octopilot/actions/detect-contexts@main
      - name: Count non-Helm matrix entries (for integration-validate)
        id: nonhelm
        shell: bash
        env:
          PIPELINE_CONTEXT: ${{ steps.detect.outputs.pipeline-context }}
        run: |
          N="$(echo "$PIPELINE_CONTEXT" | jq '[.matrix[]? | select(.language != "helm")] | length')"
          echo "count=$N" >> "$GITHUB_OUTPUT"

  lint:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).languages) != '[]'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: octopilot/actions/lint@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}

  test:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).matrix) != '[]'
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: octopilot/actions/test@main
        with:
          pipeline-context: ${{ toJson(matrix) }}

  # integration-validate expects a non-Helm matrix row (Rust/Go build). This repo’s Skaffold
  # primary artifact is Docker + Helm chart contexts, so detect-contexts only adds "helm" to the
  # test matrix. When that happens, generate the ttl UUID here; otherwise delegate to Octopilot.
  integration-validate:
    name: Integration (validate)
    needs: [detect, lint, test]
    runs-on: ubuntu-latest
    outputs:
      uuid: ${{ steps.export.outputs.uuid }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate primary build (Octopilot)
        id: validate_octo
        if: needs.detect.outputs.non-helm-matrix-count != '0'
        uses: octopilot/actions/integration-validate@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}
          smoke-binary-path: ""
          smoke-expect-pattern: ""

      - name: Generate UUID (Skaffold Docker + chart only)
        id: validate_fallback
        if: needs.detect.outputs.non-helm-matrix-count == '0'
        shell: bash
        run: |
          TTL_UUID="$(uuidgen | tr -d '-' | tr '[:upper:]' '[:lower:]')"
          echo "uuid=${TTL_UUID}" >> "$GITHUB_OUTPUT"

      - name: Export UUID
        id: export
        shell: bash
        env:
          OCTO: ${{ steps.validate_octo.outputs.uuid }}
          FB: ${{ steps.validate_fallback.outputs.uuid }}
        run: |
          if [ -n "${OCTO:-}" ]; then echo "uuid=$OCTO" >> "$GITHUB_OUTPUT"; else echo "uuid=$FB" >> "$GITHUB_OUTPUT"; fi

  # Skaffold Dockerfile artifacts: octopilot-pipeline-tools runs `docker build` on the host op process
  # (see internal/cmd/build.go). The ghcr.io/octopilot/op container mounts the socket but typically
  # does not ship the docker CLI, so Skaffold fails with "docker: executable file not found".
  # Pack/helm chart builds use the Docker API from Go and work inside op. Cronjob-log-monitor only
  # uses Pack, so it never hits this. Here: Dockerfile matrix rows build with Buildx on the runner;
  # Pack rows still use octopilot/actions/integration-build-artifact.
  integration-artifacts:
    name: Integration (${{ matrix.output_key }})
    needs: [detect, integration-validate]
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).integration_matrix) != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).integration_matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Dockerfile image on runner (ttl.sh)
        id: docker_build
        if: matrix.build_method == 'docker'
        env:
          TTL_UUID: ${{ needs.integration-validate.outputs.uuid }}
          BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
        shell: bash
        run: |
          set -euo pipefail
          SUFFIX="${{ matrix.suffix }}"
          TAG="ttl.sh/${TTL_UUID}-${SUFFIX}:1d"
          CTX="${{ matrix.context }}"
          DF="${{ matrix.dockerfile }}"
          if [ -z "$DF" ] || [ "$DF" = "null" ]; then DF="Dockerfile"; fi
          echo "Building ${TAG} (context=${CTX}, file=${DF})"
          docker buildx build --platform linux/amd64 --push \
            -t "${TAG}" \
            -f "${CTX}/${DF}" \
            "${CTX}"
          echo "${{ matrix.output_key }}=${TAG}" > outputs.txt
          jq -n --arg img "${{ matrix.image }}" --arg tag "${TAG}" \
            '{builds:[{imageName:$img,tag:$tag}]}' > build_result.json

      - name: Build and push (Octopilot Pack / chart)
        id: op_build
        if: matrix.build_method == 'pack'
        uses: octopilot/actions/integration-build-artifact@main
        with:
          artifact: ${{ toJson(matrix) }}
          ttl-uuid: ${{ needs.integration-validate.outputs.uuid }}
          op_version: v1.0.17

      - name: Upload artifact outputs
        run: |
          mkdir -p artifact-out
          mv outputs.txt "artifact-out/${{ matrix.output_key }}.txt"
          [ -f build_result.json ] && cp build_result.json artifact-out/

      - uses: actions/upload-artifact@v4
        with:
          name: integration-${{ matrix.output_key }}
          path: artifact-out
          retention-days: 1

  integration-verify:
    name: Integration (verify builds)
    needs: integration-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          pattern: integration-*
          path: artifact-outputs
      - name: Merge build_result.json
        uses: octopilot/actions/merge-build-results@main
        with:
          directory: artifact-outputs
          output-path: build_result.json
      - name: Show merged builds
        run: jq . build_result.json
      - name: Require postgres + chart build metadata
        run: |
          COUNT="$(jq '.builds | length' build_result.json)"
          if [ "$COUNT" -lt 2 ]; then
            echo "::error::Expected at least 2 integration builds (postgres image + chart), got $COUNT"
            exit 1
          fi

  publish:
    name: Publish (${{ matrix.output_key }})
    needs: [detect, integration-verify]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch') || (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.ref == 'refs/heads/master' && github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).integration_matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish Docker image
        id: docker_build
        if: matrix.build_method == 'docker'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          IMAGE="${{ matrix.image }}"
          CTX="${{ matrix.context }}"
          DF="${{ matrix.dockerfile }}"
          if [ -z "$DF" ] || [ "$DF" = "null" ]; then DF="Dockerfile"; fi
          
          echo "Publishing ${IMAGE}:${TAG} (context=${CTX}, file=${DF})"
          docker buildx build --platform linux/amd64 --push \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            -f "${CTX}/${DF}" \
            "${CTX}"

      - name: Publish chart (Octopilot Pack)
        id: op_build
        if: matrix.build_method == 'pack'
        uses: octopilot/actions/octopilot@main
        with:
          version: ${{ github.ref_name }}
          registry: ghcr.io/${{ github.repository_owner }}
          artifact: ${{ matrix.image }}
